      <div class="container">
        <nav class="breadcrumbs" aria-label="Breadcrumb">
          <a href="../index.html" data-i18n="nav_home">Home</a>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>

        <h1 class="page-title" data-i18n="cta_contact">Get in <span class="text-gradient">Touch</span></h1>
        <p class="page-subtitle">Have a question or want to collaborate? We'd love to hear from you.</p>
      </div>

    <section class="section">
      <div class="container">
        <div class="form-container" style="max-width: 600px; margin: 0 auto;">
          <form id="contact-form" class="volunteer-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="contact-name" data-i18n="form_name">Full Name <span class="required">*</span></label>
              <input type="text" id="contact-name" class="form-input" required placeholder="John Doe">
            </div>
            <div class="form-group">
              <label class="form-label" for="contact-email" data-i18n="form_email">Email Address <span class="required">*</span></label>
              <input type="email" id="contact-email" class="form-input" required placeholder="john@example.com">
            </div>
            <div class="form-group">
              <label class="form-label" for="contact-message" data-i18n="form_message">Message <span class="required">*</span></label>
              <textarea id="contact-message" class="form-textarea" rows="5" required placeholder="Your message..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-large" style="width: 100%;" data-i18n="form_submit">
              Send Message
            </button>
            <p class="form-message" id="contact-message-status"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <huna-footer></huna-footer>
